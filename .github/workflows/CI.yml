name: CI
on:
  pull_request:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
  push:
    branches:
      - master
      - 'at/test-ci-reusable'
    paths-ignore:
      - 'docs/**'
jobs:
  tests:
    name: "Tests"
    uses: "SciML/.github/.github/workflows/CI.yml@at/reusable-ci-workflow"
    with:
      group: 'Core'
    secrets: "inherit"
