name: IntegrationTest
on:
  pull_request:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
  push:
    branches:
      - master
    paths-ignore:
      - 'docs/**'

jobs:
  downstream:
    name: "Downstream"
    strategy:
      fail-fast: false
      matrix:
        package:
          - {user: SciML, repo: OrdinaryDiffEq.jl, group: InterfaceI}
          - {user: SciML, repo: OrdinaryDiffEq.jl, group: InterfaceII}
          - {user: SciML, repo: OrdinaryDiffEq.jl, group: InterfaceIII}
          - {user: SciML, repo: OrdinaryDiffEq.jl, group: InterfaceIV}
          - {user: SciML, repo: OrdinaryDiffEq.jl, group: InterfaceV}
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    uses: "SciML/.github/.github/workflows/downstream.yml@v1"
    with:
      julia-version: "1"
      owner: "${{ matrix.package.user }}"
      repo: "${{ matrix.package.repo }}"
      group: "${{ matrix.package.group }}"
      os: "${{ matrix.os }}"
    secrets: "inherit"
