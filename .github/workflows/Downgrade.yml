name: Downgrade
on:
  pull_request:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
  push:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
jobs:
  downgrade:
    if: false  # Disabled pending fix - see #208 for tracking re-enablement
    name: "Downgrade"
    strategy:
      matrix:
        group:
          - Core
    uses: "SciML/.github/.github/workflows/downgrade.yml@v1"
    with:
      julia-version: "1.10"
      group: "${{ matrix.group }}"
      skip: "Pkg,TOML"
      allow-reresolve: false
    secrets: "inherit"
